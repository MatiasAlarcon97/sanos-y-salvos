# Puerto del Gateway
server.port=8080
spring.application.name=api-gateway

# Ruta 1 - Mascotas
spring.cloud.gateway.routes[0].id=ms-mascotas
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/mascotas/**

# Ruta 2 - Geolocalizacion
spring.cloud.gateway.routes[1].id=ms-geolocalizacion
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/geoloc/**

# Ruta 3 - Coincidencias
spring.cloud.gateway.routes[2].id=ms-coincidencias
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/coincidencias/**

# CORS - permite que React se comunique con el Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.compatibility-verifier.enabled=false
